<div class="registration-page">

  <div class="container">

    <div class="registration-card shadow-lg">

      <div class="row g-0 align-items-center">

        <div class="col-lg-5 d-none d-lg-flex">
          <div class="registration-hero">
            <div class="skate-icon">
              <i class="fa fa-person-skating"></i>
            </div>

            <h1>Skate Eventos</h1>
            <p>
              Crie agora sua conta! caso nao tenha para acompanhar eventos, campeonatos,
              pistas e encontros da comunidade skate.
            </p>
          </div>
        </div>

        <div class="col-lg-7">
          <div class="registration-form">

            <h2 class="mb-2">Cadastro de Usuário</h2>
            <p class="subtitle mb-4">Preencha seus dados para criar sua conta.</p>

            <form>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Primeiro Nome</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Insira o primeiro nome"
                  />
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Último Nome</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Insira o último nome"
                  />
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  placeholder="Insira seu email"
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Insira o nome de usuário"
                />
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Senha</label>
                  <input
                    type="password"
                    class="form-control"
                    placeholder="Digite uma senha"
                  />
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Confirmar Senha</label>
                  <input
                    type="password"
                    class="form-control"
                    placeholder="Confirme a senha"
                  />
                </div>
              </div>

              <div class="form-check mb-4">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="termosUso"
                />

                <label class="form-check-label" for="termosUso">
                  Eu concordo com os
                  <a href="#">Termos de Uso</a>.
                </label>
              </div>

              <button type="submit" class="btn btn-register w-100 mb-3">
                Registrar
              </button>

              <a routerLink="/user/login" class="login-link" routerLink="/user/login">
                Já sou cadastrado
              </a>

            </form>

          </div>
        </div>

      </div>

    </div>

  </div>

</div>
