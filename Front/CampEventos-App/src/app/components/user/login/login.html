<div class="login-page d-flex align-items-center justify-content-center">

  <div class="login-card text-center shadow-lg">

    <div class="login-icon mb-3">
      <i class="fa fa-users"></i>
    </div>

    <h1 class="h3 mb-1 fw-bold">Entrar</h1>
    <p class="text-muted mb-4">Acesse sua conta da Comunidade mais Skateboard de todas!</p>

    <form class="form-signin">

      <div class="form-floating mb-3">
        <input
          type="email"
          id="username"
          name="username"
          class="form-control"
          placeholder="Usuário"
          required
        />
        <label for="username">Email</label>
      </div>

      <div class="form-floating mb-3">
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="Senha"
          required
        />
        <label for="password">Senha</label>
      </div>

      <button class="btn btn-primary btn-lg w-100 mb-3" type="submit">
        Entrar
      </button>

      <p class="text-muted small mb-2">Não tem login? Cadastre-se abaixo</p>

      <a class="btn btn-outline-secondary w-100" routerLink="/user/registration">
        Quero me cadastrar
      </a>

    </form>

  </div>

</div>
